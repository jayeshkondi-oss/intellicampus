{% extends "base.html" %}
{% block title %}Add Timetable Slot — IntelliCampus{% endblock %}
{% block page_title %}Add Timetable Slot{% endblock %}
{% block content %}
<div style="max-width:600px">
  <div class="card">
    <div class="card-header">
      <span class="card-title">New Timetable Slot</span>
      <a href="{{ url_for('admin.timetable') }}" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Department *</label>
            <select name="department_id" class="form-control" required>
              <option value="">Select</option>
              {% for d in depts %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Subject *</label>
            <select name="subject_id" class="form-control" required>
              <option value="">Select</option>
              {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }} ({{ s.code }})</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Teacher *</label>
            <select name="teacher_id" class="form-control" required>
              <option value="">Select</option>
              {% for t in teachers %}<option value="{{ t.id }}">{{ t.full_name }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Classroom</label>
            <select name="classroom_id" class="form-control">
              <option value="">Select</option>
              {% for c in classrooms %}<option value="{{ c.id }}">{{ c.name }} ({{ c.building }})</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Semester *</label>
            <select name="semester" class="form-control" required>
              {% for s in range(1,9) %}<option value="{{ s }}">Sem {{ s }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Section</label>
            <select name="section" class="form-control">
              {% for sec in ['A','B','C','D'] %}<option>{{ sec }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Day *</label>
            <select name="day_of_week" class="form-control" required>
              {% for d in ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'] %}<option>{{ d }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Start Time *</label>
            <input type="time" name="start_time" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">End Time *</label>
            <input type="time" name="end_time" class="form-control" required>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button type="submit" class="btn btn-primary">Add Slot</button>
          <a href="{{ url_for('admin.timetable') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
